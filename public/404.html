<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <title>Déménagement Lorgues</title>
    <script>
      // GitHub Pages SPA : redirige /demenagement-lorgues/parametres → /demenagement-lorgues/?/parametres
      var segmentCount = 1
      var l = window.location
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
